services:

  web:
    build: .
    container_name: web_app

    env_file:
      - .env.example

    depends_on:
      db:
        condition: service_healthy

    networks:
      - app_network

  db:
    image: postgres:17

    container_name: postgres_db

    env_file:
      - .env.example

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - app_network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer

    container_name: adminer

    ports:
      - "8080:8080"

    profiles:
      - tools

    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network: